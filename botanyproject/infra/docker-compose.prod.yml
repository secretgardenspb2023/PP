# Production stack (ТЗ Этап 1). Run from the infra/ directory on the VPS:
#   docker compose -f docker-compose.prod.yml --env-file ../.env up -d --build
# Internal services are not published; only Nginx exposes 80/443.
name: poiskplant-prod

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms1g -Xmx1g}
      bootstrap.memory_lock: "true"
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend: &backend
    build:
      context: ../backend
      args:
        REQUIREMENTS: prod
    env_file: ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes:
      - static_data:/app/staticfiles
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    command: ["prod"]
    restart: unless-stopped

  worker:
    <<: *backend
    command: ["worker"]
    depends_on:
      - backend

  imgproxy:
    image: darthsim/imgproxy:latest
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: ${AWS_S3_ENDPOINT_URL}
      IMGPROXY_S3_REGION: ${AWS_S3_REGION_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # imgproxy v3 names (latest); auto-negotiate WebP/AVIF from the Accept header.
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_AUTO_AVIF: "true"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    environment:
      DOMAIN: ${DOMAIN}
      STAGING_DOMAIN: ${STAGING_DOMAIN:-staging.localhost}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - static_data:/app/staticfiles:ro
      - img_cache:/var/cache/nginx/img
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - imgproxy
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renew twice a day; nginx reloads on its own schedule.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'
    restart: unless-stopped

  frontend:                            # ТЗ Этап 6 (Next.js SSR)
    build:
      context: ../../Frontend
      args:
        # relative base → browser calls the API on the same origin (any domain),
        # which also keeps the auth refresh cookie same-site.
        NEXT_PUBLIC_API_BASE: /api/v1
        # Telegram Login Widget bot (ТЗ 3.5). Бот должен иметь /setdomain на текущий домен.
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
        # Yandex SmartCaptcha client (site) key — невидимая капча (ТЗ 3.8). Пусто = выкл.
        NEXT_PUBLIC_SMARTCAPTCHA_CLIENT_KEY: ${SMARTCAPTCHA_CLIENT_KEY:-}
    environment:
      NODE_ENV: production
      # server-side (RSC) fetches use the internal backend address
      API_BASE: http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  es_data:
  static_data:
  img_cache:
