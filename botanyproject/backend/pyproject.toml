[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
python_files = ["test_*.py", "tests.py", "*_tests.py"]
addopts = "-ra"

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.ruff.lint.per-file-ignores]
# catalog models map the client's existing nullable string columns (managed=False),
# so null=True is intentional and accurate to the real schema.
"apps/catalog/models.py" = ["DJ001"]
