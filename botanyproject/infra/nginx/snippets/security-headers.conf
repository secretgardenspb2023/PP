# Security headers (ТЗ Этап 1.4 / 9.3). Included in every server block.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
# CSP allows Yandex.Metrika (ТЗ 8.8) и виджет входа Telegram (script telegram.org +
# iframe oauth.telegram.org, ТЗ 3.5). 'unsafe-inline' kept for the initial Next.js
# build; tighten to nonces/hashes during the SEO/perf pass (этап 8).
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://telegram.org; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://mc.yandex.ru; frame-src https://oauth.telegram.org; child-src https://oauth.telegram.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
