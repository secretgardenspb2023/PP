# Main Nginx config for PoiskPlant (ТЗ Этап 1.4, 9.1). Server blocks are in
# templates/ (rendered with envsubst by the official nginx image).
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;            # do not leak the Nginx version
    client_max_body_size 25m;       # photo uploads from the admin

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    # ---- Compression (ТЗ 8.10) ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/json application/javascript
        application/xml+rss text/xml image/svg+xml application/font-woff2;

    # ---- Rate limiting (ТЗ 9.1): tight on auth, looser global ----
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
    limit_req_status 429;

    # ---- Disk cache for processed images from imgproxy (ТЗ 9) ----
    proxy_cache_path /var/cache/nginx/img levels=1:2 keys_zone=img_cache:50m
                     max_size=5g inactive=30d use_temp_path=off;

    upstream backend  { server backend:8000; }
    upstream imgproxy { server imgproxy:8080; }
    upstream frontend { server frontend:3000; }   # ТЗ Этап 6 (Next.js SSR)

    # ---- 301-редиректы со старых WP-URL старого сайта на новые карточки (ТЗ 8.6).
    # Ключ — ДЕкодированный путь ($uri, nginx декодирует %XX в UTF-8), значение —
    # /plant/<slug>. Правила сгенерированы scratch/build_redirects.py по id_pp карточек.
    # Большие hash-размеры — под ~12к правил с длинными кириллич. ключами.
    map_hash_max_size 65536;
    map_hash_bucket_size 512;
    map $uri $old_redirect {
        default "";
        include /etc/nginx/snippets/redirects.map;
    }

    include /etc/nginx/conf.d/*.conf;
}
