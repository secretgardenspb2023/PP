name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: poiskplant
          POSTGRES_USER: poiskplant
          POSTGRES_PASSWORD: poiskplant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U poiskplant"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-secret-key
      DATABASE_URL: postgres://poiskplant:poiskplant@localhost:5432/poiskplant
      REDIS_URL: redis://localhost:6379/0
      ELASTICSEARCH_URL: http://localhost:9200

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Django system checks
        run: python manage.py check

      - name: Migrations are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Tests
        run: pytest
