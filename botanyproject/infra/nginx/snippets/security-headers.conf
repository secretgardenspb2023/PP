# Security headers (ТЗ Этап 1.4 / 9.3). Included in every server block.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Strict-Transport-Security "max-age=31536000" always;
# CSP allows Yandex.Metrika (ТЗ 8.8), виджет входа Telegram (script telegram.org +
# iframe oauth.telegram.org, ТЗ 3.5) и Yandex SmartCaptcha (script/iframe/connect на
# smartcaptcha.yandexcloud.net + статика yastatic.net, ТЗ 3.8). 'unsafe-inline' kept for
# the initial Next.js build; tighten to nonces/hashes during the SEO/perf pass (этап 8).
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://mc.yandex.ru https://telegram.org https://smartcaptcha.yandexcloud.net https://yastatic.net; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://mc.yandex.ru https://smartcaptcha.yandexcloud.net https://yastatic.net; frame-src https://oauth.telegram.org https://smartcaptcha.yandexcloud.net; child-src https://oauth.telegram.org https://smartcaptcha.yandexcloud.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
